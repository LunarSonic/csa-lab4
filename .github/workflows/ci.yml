name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Lint Tools
        run: pip install ruff mypy pytest pytest-golden PyYAML

      - name: Python Formatter Check
        run: ruff format --check .

      - name: Python Lint Check
        run: ruff check .

      - name: Python Type Check
        run: mypy src/

      - name: Run Golden Tests
        run: pytest tests/test_golden.py -v